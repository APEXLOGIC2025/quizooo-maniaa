<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizArena - Admin Panel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #7c3aed;
      --success: #10b981;
      --danger: #ef4444;
      --card: #111827;
      --border: #374151;
      --text: #f3f4f6;
    }
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .logo { font-size: 1.5rem; font-weight: 700; color: #fbbf24; }
    .btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.3s;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #6d28d9; }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { background: #059669; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.8rem; }
    
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      z-index: 9999;
    }
    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 25px rgba(0,0,0,0.3);
    }
    .login-box h1 {
      text-align: center;
      margin-bottom: 0.5rem;
      color: #fbbf24;
      font-size: 1.8rem;
    }
    .login-box p {
      text-align: center;
      color: #9ca3af;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      padding: 0.75rem;
      background: #1f2937;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .login-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid var(--danger);
      border-radius: 8px;
      padding: 0.75rem;
      color: #fca5a5;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      display: none;
    }
    .login-error.show { display: block; }
    .login-btn {
      width: 100%;
      padding: 0.75rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s;
    }
    .login-btn:hover { background: #6d28d9; }
    
    .dashboard { display: none; }
    .dashboard.active { display: block; }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
    }
    .stat-card .value {
      font-size: 2rem;
      font-weight: 700;
      color: #fbbf24;
      margin: 0.5rem 0;
    }
    .stat-card .label {
      font-size: 0.85rem;
      color: #9ca3af;
      text-transform: uppercase;
    }
    
    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      padding: 0.75rem 1rem;
      background: none;
      border: none;
      color: #9ca3af;
      cursor: pointer;
      font-weight: 500;
      border-bottom: 2px solid transparent;
    }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    .search-box { margin-bottom: 1.5rem; }
    .search-box input {
      width: 100%;
      padding: 0.75rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
    }
    
    .hosts-list { display: grid; gap: 1rem; }
    .host-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .host-info h3 { margin-bottom: 0.25rem; }
    .host-info p { color: #9ca3af; font-size: 0.85rem; }
    
    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-active { background: rgba(16, 185, 129, 0.2); color: #86efac; }
    .badge-sub { background: rgba(59, 130, 246, 0.2); color: #93c5fd; }
    
    .host-actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .days-select {
      padding: 0.5rem;
      background: #1f2937;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
    }
    
    .loading { text-align: center; padding: 2rem; color: #9ca3af; }
  </style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <h1>🛡️</h1>
    <h1>Admin Panel</h1>
    <p>Sign in with your admin account</p>
    <div id="loginError" class="login-error"></div>
    <div class="form-group">
      <label>Email</label>
      <input id="loginEmail" type="email" value="shukla1976yash@gmail.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input id="loginPassword" type="password" placeholder="Your password">
    </div>
    <button class="login-btn" id="loginBtn" onclick="adminLogin()">Sign In</button>
  </div>
</div>

<div id="dashboard" class="dashboard">
  <div class="container">
    <div class="header">
      <div class="logo">🛡️ QuizArena Admin</div>
      <button class="btn btn-danger btn-sm" onclick="adminLogout()">Sign Out</button>
    </div>
    
    <div class="stats">
      <div class="stat-card">
        <div class="label">Total Hosts</div>
        <div class="value" id="statTotalHosts">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Subscribed</div>
        <div class="value" id="statSubscribed">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Sessions</div>
        <div class="value" id="statSessions">0</div>
      </div>
    </div>
    
    <div class="tabs">
      <button class="tab active" onclick="switchTab('hosts')">All Hosts</button>
      <button class="tab" onclick="switchTab('subscriptions')">Subscriptions</button>
    </div>
    
    <div id="hostsTab" class="tab-content active">
      <div class="search-box">
        <input type="text" placeholder="Search..." onkeyup="filterHosts()">
      </div>
      <div id="hostsList" class="hosts-list">
        <div class="loading">Loading hosts...</div>
      </div>
    </div>
    
    <div id="subscriptionsTab" class="tab-content">
      <div class="search-box">
        <input type="text" placeholder="Search..." onkeyup="filterSubscriptions()">
      </div>
      <div id="subscriptionsList" class="hosts-list">
        <div class="loading">Loading subscriptions...</div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebaseapp/10.4.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebaseapp/10.4.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebaseapp/10.4.0/firebase-database.js"></script>

<script>
let auth, db;
let fbReady = false;

// Initialize Firebase
try{
  firebase.initializeApp({
  apiKey: "AIzaSyDzxuqiIWYGl5hzrOZvEweUHNMq1xG7eKY",
  authDomain: "quizomania-8f783.firebaseapp.com",
  databaseURL: "https://quizomania-8f783-default-rtdb.firebaseio.com",
  projectId: "quizomania-8f783"
});

  auth = firebase.auth();
  db = firebase.database();
  fbReady = true;
  console.log('✅ Firebase ready');
}catch(e){
  console.error('Firebase error:', e);
  document.getElementById('loginError').textContent = 'Firebase CDN not loading. Check your internet connection or try a different network.';
  document.getElementById('loginError').classList.add('show');
}

let allHosts = [];
let currentAdminUID = null;

// LOGIN
async function adminLogin(){
  if(!fbReady || !auth){
    alert('Firebase not ready yet. Please wait and try again in a moment.');
    return;
  }
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value.trim();
  const errorEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  
  if(!email || !password){
    showError('Please enter email and password');
    return;
  }
  
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  
  try{
    const res = await auth.signInWithEmailAndPassword(email, password);
    currentAdminUID = res.user.uid;
    
    const adminFlags = await db.ref(`admin_flags/${currentAdminUID}`).get();
    if(!adminFlags.exists() || !adminFlags.val().isAdmin){
      showError('Access denied: Not an admin');
      await auth.signOut();
      btn.disabled = false;
      btn.textContent = 'Sign In';
      return;
    }
    
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').classList.add('active');
    loadData();
  }catch(e){
    showError(e.message);
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

function showError(msg){
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.classList.add('show');
}

// LOGOUT
async function adminLogout(){
  await auth.signOut();
  location.reload();
}

// LOAD DATA
async function loadData(){
  try{
    const snap = await db.ref('hosts').get();
    allHosts = [];
    
    if(snap.exists()){
      const data = snap.val();
      Object.keys(data).forEach(uid => {
        allHosts.push({uid, ...data[uid]});
      });
    }
    
    updateStats();
    renderAllHosts();
    renderSubscriptions();
  }catch(e){
    alert('Error: ' + e.message);
  }
}

// STATS
function updateStats(){
  const total = allHosts.length;
  const subscribed = allHosts.filter(h => {
    if(h.perpetual) return true;
    if(!h.subscribedUntil) return false;
    return new Date(h.subscribedUntil) > new Date();
  }).length;
  const sessions = allHosts.reduce((sum, h) => sum + (h.sessionsHosted || 0), 0);
  
  document.getElementById('statTotalHosts').textContent = total;
  document.getElementById('statSubscribed').textContent = subscribed;
  document.getElementById('statSessions').textContent = sessions;
}

// RENDER HOSTS
function renderAllHosts(){
  const el = document.getElementById('hostsList');
  
  el.innerHTML = allHosts.map(h => {
    const isSub = h.perpetual || (h.subscribedUntil && new Date(h.subscribedUntil) > new Date());
    
    return `<div class="host-card">
      <div class="host-info">
        <h3>${esc(h.name || '—')}</h3>
        <p>${esc(h.email || '')}</p>
        <p>${esc(h.city || '')} ${h.country ? ', ' + esc(h.country) : ''}</p>
      </div>
      <span class="badge ${isSub ? 'badge-sub' : 'badge-active'}">
        ${isSub ? '✓ SUBSCRIBED' : '• TRIAL'}
      </span>
    </div>`;
  }).join('');
}

// RENDER SUBSCRIPTIONS
function renderSubscriptions(){
  const el = document.getElementById('subscriptionsList');
  
  el.innerHTML = allHosts.map(h => {
    const subExp = h.subscribedUntil ? new Date(h.subscribedUntil) : null;
    const isSub = h.perpetual || (subExp && subExp > new Date());
    const daysLeft = isSub && subExp ? Math.ceil((subExp - new Date()) / 86400000) : 0;
    
    return `<div class="host-card">
      <div class="host-info" style="flex:1;">
        <h3>${esc(h.name || '—')}</h3>
        <p>${esc(h.email || '')}</p>
        ${isSub ? `<p style="color:#86efac;">✓ Subscribed (${daysLeft}d)</p>` : '<p style="color:#fca5a5;">No subscription</p>'}
      </div>
      <div class="host-actions">
        ${!isSub ? `
          <select class="days-select" id="days-${h.uid}">
            <option value="30">+30 days</option>
            <option value="60">+60 days</option>
            <option value="365">+1 year</option>
            <option value="9999">Perpetual</option>
          </select>
          <button class="btn btn-success btn-sm" onclick="grantSub('${h.uid}', '${esc(h.name||'').replace(/'/g,"\\'")}')">Grant</button>
        ` : `
          <button class="btn btn-danger btn-sm" onclick="revokeSub('${h.uid}', '${esc(h.name||'').replace(/'/g,"\\'")}')">Revoke</button>
        `}
      </div>
    </div>`;
  }).join('');
}

// GRANT
async function grantSub(uid, name){
  const daysEl = document.getElementById(`days-${uid}`);
  const days = parseInt(daysEl.value);
  
  try{
    let data = {subscribed: true, perpetual: false};
    if(days === 9999){
      data.perpetual = true;
      data.subscribedUntil = null;
    }else{
      const exp = new Date();
      exp.setDate(exp.getDate() + days);
      data.subscribedUntil = exp.toISOString();
    }
    
    await db.ref(`hosts/${uid}`).update(data);
    alert('✓ Subscription granted!');
    loadData();
  }catch(e){
    alert('Error: ' + e.message);
  }
}

// REVOKE
async function revokeSub(uid, name){
  if(!confirm(`Revoke ${name}'s subscription?`)) return;
  
  try{
    await db.ref(`hosts/${uid}`).update({
      subscribed: false,
      perpetual: false,
      subscribedUntil: null
    });
    alert('✓ Subscription revoked!');
    loadData();
  }catch(e){
    alert('Error: ' + e.message);
  }
}

// FILTER
function filterHosts(){
  const query = event.target.value.toLowerCase();
  const el = document.getElementById('hostsList');
  const filtered = allHosts.filter(h => 
    (h.name || '').toLowerCase().includes(query) ||
    (h.email || '').toLowerCase().includes(query)
  );
  
  el.innerHTML = filtered.map(h => {
    const isSub = h.perpetual || (h.subscribedUntil && new Date(h.subscribedUntil) > new Date());
    return `<div class="host-card">
      <div class="host-info">
        <h3>${esc(h.name || '—')}</h3>
        <p>${esc(h.email || '')}</p>
      </div>
      <span class="badge ${isSub ? 'badge-sub' : 'badge-active'}">
        ${isSub ? '✓ SUB' : '• TRIAL'}
      </span>
    </div>`;
  }).join('');
}

function filterSubscriptions(){
  const query = event.target.value.toLowerCase();
  const el = document.getElementById('subscriptionsList');
  const filtered = allHosts.filter(h => 
    (h.name || '').toLowerCase().includes(query) ||
    (h.email || '').toLowerCase().includes(query)
  );
  
  el.innerHTML = filtered.map(h => {
    const subExp = h.subscribedUntil ? new Date(h.subscribedUntil) : null;
    const isSub = h.perpetual || (subExp && subExp > new Date());
    const daysLeft = isSub && subExp ? Math.ceil((subExp - new Date()) / 86400000) : 0;
    
    return `<div class="host-card">
      <div class="host-info" style="flex:1;">
        <h3>${esc(h.name || '—')}</h3>
        <p>${esc(h.email || '')}</p>
        ${isSub ? `<p style="color:#86efac;">✓ (${daysLeft}d)</p>` : '<p style="color:#fca5a5;">No sub</p>'}
      </div>
      <div class="host-actions">
        ${!isSub ? `
          <select class="days-select" id="days-${h.uid}">
            <option value="30">+30</option>
            <option value="365">+1yr</option>
            <option value="9999">Perp</option>
          </select>
          <button class="btn btn-success btn-sm" onclick="grantSub('${h.uid}', '${esc(h.name||'').replace(/'/g,"\\'")}')">Grant</button>
        ` : `
          <button class="btn btn-danger btn-sm" onclick="revokeSub('${h.uid}', '${esc(h.name||'').replace(/'/g,"\\'")}')">Revoke</button>
        `}
      </div>
    </div>`;
  }).join('');
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(tab + 'Tab').classList.add('active');
}

function esc(text){
  const m = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'};
  return text.replace(/[&<>"']/g, c => m[c]);
}
</script>

</body>
</html>
